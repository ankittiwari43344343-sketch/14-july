<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send Birthday Wish | 14 July</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#eef5ff;
}

header{
background:#1565c0;
color:white;
padding:18px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
max-width:600px;
margin:40px auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
}

h2{
text-align:center;
color:#1565c0;
margin-bottom:10px;
}

.sub{
text-align:center;
color:#666;
margin-bottom:30px;
}

label{
display:block;
font-weight:bold;
margin-top:18px;
margin-bottom:8px;
}

input,textarea{
width:100%;
padding:14px;
border:1px solid #ccc;
border-radius:12px;
font-size:16px;
}

textarea{
height:180px;
resize:none;
}

button{
width:100%;
padding:15px;
margin-top:25px;
background:#1565c0;
color:white;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#0d47a1;
}

.back{
display:block;
margin-top:20px;
text-align:center;
text-decoration:none;
color:#1565c0;
font-weight:bold;
}

.tip{
margin-top:25px;
padding:18px;
background:#f4f8ff;
border-left:5px solid #1565c0;
border-radius:10px;
color:#444;
}

</style>

</head>
<body>

<header>
🎂 Send Birthday Wish
</header>

<div class="container">

<h2>Make Someone Smile ❤️</h2>

<p class="sub">
Send a heartfelt birthday wish to brighten someone's special day.
</p>

<label>Friend's Email</label>

<input type="email" id="receiver"
placeholder="friend@email.com">

<label>Your Birthday Wish</label>

<textarea id="wish"
placeholder="Happy Birthday! I hope your day is filled with happiness, love and beautiful memories..."></textarea>

<button id="sendBtn">
🎉 Send Wish
</button>

<div class="tip">

<b>💡 Tip</b><br><br>

Kind words can make someone's birthday unforgettable.

</div>

<a href="dashboard.html" class="back">
⬅ Back to Dashboard
</a>

</div>

<script type="module" src="wish.js"></script>

</body>
</html>
