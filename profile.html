<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile | 14 July</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f8ff;
}

header{
background:#1565c0;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
max-width:500px;
margin:40px auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.profile-pic{
text-align:center;
margin-bottom:25px;
}

.profile-pic img{
width:120px;
height:120px;
border-radius:50%;
border:4px solid #1565c0;
object-fit:cover;
}

.profile-pic input{
margin-top:15px;
}

h2{
text-align:center;
color:#1565c0;
margin-bottom:20px;
}

label{
display:block;
margin-top:15px;
margin-bottom:5px;
font-weight:bold;
}

input,textarea{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
}

textarea{
height:90px;
resize:none;
}

button{
width:100%;
padding:14px;
margin-top:25px;
background:#1565c0;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#0d47a1;
}

.back{
display:block;
margin-top:20px;
text-align:center;
text-decoration:none;
color:#1565c0;
font-weight:bold;
}

@media(max-width:600px){
.container{
margin:20px;
}
}
</style>

</head>

<body>

<header>
👤 My Profile
</header>

<div class="container">

<div class="profile-pic">

<img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="preview">

<br><br>

<input type="file" id="photo">

</div>

<h2>Edit Your Profile</h2>

<label>Full Name</label>
<input
type="text"
id="name"
placeholder="Enter your full name">

<label>Date of Birth</label>
<input
type="date"
id="dob">

<label>Bio</label>
<textarea
id="bio"
placeholder="Tell people about yourself"></textarea>

<button id="saveBtn">
💾 Save Profile
</button>

<a href="dashboard.html" class="back">
⬅ Back to Dashboard
</a>

</div>

<script type="module" src="profile.js"></script>

</body>
</html>
